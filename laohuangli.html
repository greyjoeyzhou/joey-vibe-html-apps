<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老黄历</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#8B1A1A;--dred:#5c0000;--gold:#D4AF37;--lgold:#f0d080;--dark:#120500;
  --paper:#FFF8DC;--paper2:#f5e6c8;--green:#2d7a2d;--shadow:rgba(0,0,0,.6)
}
body{background:var(--dark);color:var(--paper);font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
/* ── HEADER ── */
.hdr{width:100%;background:linear-gradient(160deg,#3a0000,var(--red));border-bottom:3px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-title{font-size:1.9rem;color:var(--gold);text-shadow:2px 2px 6px #000;letter-spacing:.15em}
.hdr-sub{font-size:.82rem;color:var(--lgold);margin-top:2px;letter-spacing:.08em}
.today-btn{background:var(--dred);border:1px solid var(--gold);color:var(--lgold);padding:6px 16px;cursor:pointer;font-size:.85rem;font-family:inherit;border-radius:3px;letter-spacing:.05em}
.today-btn:hover{background:var(--red)}
/* ── MAIN ── */
.wrap{max-width:960px;width:100%;padding:16px}
/* ── MONTH NAV ── */
.mnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.nav-btn{background:var(--dred);border:2px solid var(--gold);color:var(--gold);width:38px;height:38px;font-size:1.2rem;cursor:pointer;border-radius:4px;font-family:inherit}
.nav-btn:hover{background:var(--red);transform:scale(1.05)}
.mtitle{text-align:center}
.mtitle .solar-m{font-size:1.55rem;color:var(--gold);font-weight:700}
.mtitle .lunar-m{font-size:.82rem;color:var(--lgold);margin-top:2px}
/* ── WEEKDAY ROW ── */
.wk-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.wk{text-align:center;padding:6px 0;font-size:.8rem;color:var(--gold);border-bottom:1px solid rgba(212,175,55,.35)}
.wk.sat,.wk.sun{color:#e08080}
/* ── GRID ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day{background:rgba(139,26,26,.08);border:1px solid rgba(212,175,55,.18);min-height:72px;padding:6px 7px;cursor:pointer;transition:.18s all;position:relative;border-radius:3px}
.day:hover{background:rgba(139,26,26,.35);border-color:rgba(212,175,55,.6)}
.day.today{background:rgba(139,26,26,.45);border:2px solid var(--gold)}
.day.sel{background:rgba(100,20,20,.8);border:2px solid #FFD700;box-shadow:0 0 10px rgba(212,175,55,.4)}
.day.other{opacity:.28}
.day.weekend .snum{color:#e08080}
.snum{font-size:1.25rem;font-weight:700;color:var(--paper);line-height:1}
.ldate{font-size:.7rem;color:var(--gold);margin-top:3px;line-height:1.3}
.jqtag{font-size:.63rem;color:#7dda7d;margin-top:2px;font-weight:600}
.lnytag{font-size:.63rem;color:#FFD700;background:rgba(139,26,26,.6);border:1px solid var(--gold);border-radius:2px;padding:1px 4px;display:inline-block;margin-top:2px}
/* ── DETAIL PANEL ── */
.det{background:linear-gradient(160deg,#1a0500,#2e1000);border:2px solid var(--gold);border-radius:8px;padding:20px;margin-top:16px}
.det-top{text-align:center;border-bottom:1px solid rgba(212,175,55,.4);padding-bottom:14px;margin-bottom:16px}
.det-solar{font-size:1.7rem;color:var(--gold);font-weight:700}
.det-lunar{font-size:1rem;color:var(--lgold);margin-top:5px}
.det-gz{font-size:.88rem;color:#c8b860;margin-top:4px;letter-spacing:.06em}
.det-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.det-grid{grid-template-columns:repeat(4,1fr)}}
.ditem{background:rgba(255,255,255,.04);border-left:3px solid var(--gold);padding:9px 11px;border-radius:3px}
.dlabel{font-size:.72rem;color:var(--gold);margin-bottom:3px;letter-spacing:.05em}
.dval{font-size:.95rem;color:var(--paper)}
.yiji{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:2px}
.ybox{background:rgba(0,80,0,.18);border:1px solid rgba(76,175,80,.5);padding:12px;border-radius:4px}
.jbox{background:rgba(100,0,0,.18);border:1px solid rgba(220,60,60,.5);padding:12px;border-radius:4px}
.ytitle{color:#6dbf6d;font-size:.95rem;margin-bottom:8px;font-weight:600}
.jtitle{color:#e06060;font-size:.95rem;margin-bottom:8px;font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.ytag{padding:2px 9px;border-radius:12px;font-size:.78rem;background:rgba(76,175,80,.15);color:#a0e0a0;border:1px solid rgba(76,175,80,.4)}
.jtag{padding:2px 9px;border-radius:12px;font-size:.78rem;background:rgba(220,60,60,.15);color:#e89090;border:1px solid rgba(220,60,60,.4)}
.sel-hint{text-align:center;color:rgba(212,175,55,.4);padding:20px;font-size:.9rem}
/* border flourish */
.hdr::before,.hdr::after{content:'✦';color:var(--gold);font-size:.9rem;opacity:.6}
</style>
</head>
<body>
<div class="hdr">
  <span style="display:flex;align-items:center;gap:10px">
    <span style="font-size:1.5rem">☯</span>
    <span><div class="hdr-title">老 黄 历</div><div class="hdr-sub">中华传统历法 · 农历通书</div></span>
  </span>
  <button class="today-btn" onclick="goToday()">今日 · Today</button>
</div>
<div class="wrap">
  <div class="mnav">
    <button class="nav-btn" onclick="shiftMonth(-1)">◁</button>
    <div class="mtitle" id="mtitle"></div>
    <button class="nav-btn" onclick="shiftMonth(1)">▷</button>
  </div>
  <div class="wk-row">
    <div class="wk sun">日</div><div class="wk">一</div><div class="wk">二</div>
    <div class="wk">三</div><div class="wk">四</div><div class="wk">五</div><div class="wk sat">六</div>
  </div>
  <div class="cal-grid" id="calgrid"></div>
  <div class="det" id="detpanel"><div class="sel-hint">点击任意日期查看详细老黄历 ↑</div></div>
</div>

<script type="module">
const TYME_SOURCES=[
  'https://esm.sh/tyme4ts@1.4.6',
  './vendor/tyme4ts.mjs'
];

async function loadTyme(){
  const errors=[];
  for(const src of TYME_SOURCES){
    try{
      return await import(src);
    }catch(error){
      errors.push(`${src}: ${error instanceof Error ? error.message : String(error)}`);
    }
  }
  throw new Error(`Tyme load failed. Tried: ${errors.join(' | ')}`);
}

const { SolarDay, SolarTerm } = await loadTyme();

const ZODIAC=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
const ZODIAC_E=['Rat','Ox','Tiger','Rabbit','Dragon','Snake','Horse','Goat','Monkey','Rooster','Dog','Pig'];

const JQ_DAY_CACHE={};
function getMonthJieqi(y,m){
  const key=`${y}-${m}`;
  if(JQ_DAY_CACHE[key])return JQ_DAY_CACHE[key];
  const map={};
  for(let i=0;i<24;i++){
    const term=SolarTerm.fromIndex(y,i);
    const solarDay=term.getSolarDay();
    if(solarDay.getYear()===y&&solarDay.getMonth()===m){
      map[solarDay.getDay()]=term.getName();
    }
  }
  return JQ_DAY_CACHE[key]=map;
}
const SOL_MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

// ════════════════════════════════════════════════════════
// MAIN: convert Gregorian → Chinese calendar info
// ════════════════════════════════════════════════════════
function toChineseCal(y,m,d){
  const solar=SolarDay.fromYmd(y,m,d);
  const lunar=solar.getLunarDay();
  const lunarMonth=lunar.getLunarMonth();
  const lunarYear=lunarMonth.getLunarYear();
  const sixtyCycleDay=solar.getSixtyCycleDay();
  const dayCycle=sixtyCycleDay.getSixtyCycle();
  const dayStem=dayCycle.getHeavenStem();
  const dayBranch=dayCycle.getEarthBranch();
  const monthCycle=sixtyCycleDay.getMonth();
  const yearCycle=lunarYear.getSixtyCycle();
  const chongBranch=dayBranch.getOpposite();

  return{
    lunarYear:lunar.getYear(),
    lunarMonth:lunar.getMonth(),
    lunarDay:lunar.getDay(),
    isLeap:lunarMonth.isLeap(),
    lunarMonthName:lunarMonth.getName(),
    lunarDayName:lunar.getName(),
    dayGZ:{gan:dayStem.getName(),zhi:dayBranch.getName(),full:dayCycle.getName()},
    monthGZ:monthCycle.getName(),
    yearGZ:yearCycle.getName(),
    zodiac:yearCycle.getEarthBranch().getZodiac().getName(),
    wuxing:dayStem.getElement().getName()+'行',
    chong:`冲${chongBranch.getZodiac().getName()}(${chongBranch.getName()})`,
    yi:lunar.getRecommends().map(taboo=>taboo.getName()),
    ji:lunar.getAvoids().map(taboo=>taboo.getName())
  };
}

// ════════════════════════════════════════════════════════
// STATE & RENDERING
// ════════════════════════════════════════════════════════
const NOW=new Date();
let viewY=NOW.getFullYear(),viewM=NOW.getMonth()+1;
let selDate=null;

function shiftMonth(d){viewM+=d;if(viewM>12){viewM=1;viewY++;}if(viewM<1){viewM=12;viewY--;}render();}
function goToday(){viewY=NOW.getFullYear();viewM=NOW.getMonth()+1;selDate=null;render();showToday();}
function showToday(){
  const d=new Date();
  selectDate(d.getFullYear(),d.getMonth()+1,d.getDate());
}

function render(){
  renderMonthTitle();
  renderGrid();
  if(selDate)renderDetail(selDate.y,selDate.m,selDate.d);
}

function renderMonthTitle(){
  const c=toChineseCal(viewY,viewM,1);
  document.getElementById('mtitle').innerHTML=
    `<div class="solar-m">${viewY}年 ${SOL_MONTHS[viewM-1]}</div>`+
    `<div class="lunar-m">${c.yearGZ}年 · ${c.zodiac}年 · 农历${c.lunarMonthName}</div>`;
}

function renderGrid(){
  const grid=document.getElementById('calgrid');
  grid.innerHTML='';
  const first=new Date(viewY,viewM-1,1).getDay(); // 0=Sun
  const daysIn=new Date(viewY,viewM,0).getDate();
  const jqMap=getMonthJieqi(viewY,viewM);
  const todayY=NOW.getFullYear(),todayM=NOW.getMonth()+1,todayD=NOW.getDate();

  // prev month filler
  const prevD=new Date(viewY,viewM-1,0).getDate();
  for(let i=0;i<first;i++){
    const pd=prevD-first+1+i;
    const pm=viewM-1||12,py=viewM===1?viewY-1:viewY;
    grid.appendChild(makeCell(py,pm,pd,true));
  }
  for(let d=1;d<=daysIn;d++){
    const el=makeCell(viewY,viewM,d,false);
    if(viewY===todayY&&viewM===todayM&&d===todayD)el.classList.add('today');
    if(selDate&&selDate.y===viewY&&selDate.m===viewM&&selDate.d===d)el.classList.add('sel');
    grid.appendChild(el);
  }
  // next month filler
  const total=first+daysIn;
  const rows=Math.ceil(total/7);
  const rem=rows*7-total;
  for(let i=1;i<=rem;i++){
    const nm=viewM+1>12?1:viewM+1,ny=viewM+1>12?viewY+1:viewY;
    grid.appendChild(makeCell(ny,nm,i,true));
  }
}

function makeCell(y,m,d,other){
  const el=document.createElement('div');
  el.className='day'+(other?' other':'');
  const dow=new Date(y,m-1,d).getDay();
  if(dow===0||dow===6)el.classList.add('weekend');

  const c=toChineseCal(y,m,d);
  const jqMap=getMonthJieqi(y,m);

  let lhtml=c.lunarDay===1?c.lunarMonthName:c.lunarDayName;

  let extras='';
  if(jqMap[d])extras+=`<div class="jqtag">${jqMap[d]}</div>`;
  // Chinese New Year indicator
  if(c.lunarDay===1&&c.lunarMonth===1&&!c.isLeap&&!other)
    extras+=`<div class="lnytag">春节</div>`;

  el.innerHTML=`<div class="snum">${d}</div><div class="ldate">${lhtml}</div>${extras}`;
  el.onclick=()=>selectDate(y,m,d);
  return el;
}

function selectDate(y,m,d){
  selDate={y,m,d};
  // Update view
  if(y!==viewY||m!==viewM){viewY=y;viewM=m;renderGrid();renderMonthTitle();}
  else renderGrid();
  renderDetail(y,m,d);
}

function renderDetail(y,m,d){
  const c=toChineseCal(y,m,d);
  const jqMap=getMonthJieqi(y,m);
  const jq=jqMap[d]||'';
  const dow=['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];
  const lmonStr=c.lunarMonthName;
  const isLNY=(c.lunarDay===1&&c.lunarMonth===1&&!c.isLeap);

  document.getElementById('detpanel').innerHTML=`
  <div class="det-top">
    <div class="det-solar">${y}年${SOL_MONTHS[m-1]}${d}日 &nbsp;周${dow}${isLNY?' 🎆 春节':''}</div>
    <div class="det-lunar">农历 ${c.yearGZ}年 &nbsp;${lmonStr} &nbsp;${c.lunarDayName}</div>
    <div class="det-gz">${c.yearGZ}年 &nbsp;${c.monthGZ}月 &nbsp;${c.dayGZ.full}日 &nbsp;·&nbsp; ${c.zodiac}年 ${jq?'&nbsp;·&nbsp;'+jq:''}</div>
  </div>
  <div class="det-grid">
    <div class="ditem"><div class="dlabel">🌿 生肖</div><div class="dval">${c.zodiac}（${ZODIAC_E[ZODIAC.indexOf(c.zodiac)]}）</div></div>
    <div class="ditem"><div class="dlabel">🔥 日五行</div><div class="dval">${c.wuxing}</div></div>
    <div class="ditem"><div class="dlabel">⚔ 冲</div><div class="dval">${c.chong}</div></div>
    <div class="ditem"><div class="dlabel">🌸 节气</div><div class="dval">${jq||'—'}</div></div>
  </div>
  <div class="yiji">
    <div class="ybox">
      <div class="ytitle">✦ 宜</div>
      <div class="tags">${c.yi.map(a=>`<span class="ytag">${a}</span>`).join('')}</div>
    </div>
    <div class="jbox">
      <div class="jtitle">✦ 忌</div>
      <div class="tags">${c.ji.map(a=>`<span class="jtag">${a}</span>`).join('')}</div>
    </div>
  </div>`;
}

// ── INIT ──
window.shiftMonth=shiftMonth;
window.goToday=goToday;
try{
  render();
  showToday();
}catch(error){
  document.getElementById('detpanel').innerHTML=`<div class="sel-hint">Tyme 初始化失败：${error instanceof Error ? error.message : String(error)}</div>`;
  throw error;
}
</script>
</body>
</html>
