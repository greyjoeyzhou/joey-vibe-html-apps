<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風水羅盤 · Feng Shui Compass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0f; --ink2: #12121a; --ink3: #1c1c28;
  --cinnabar: #c0392b; --cinnabar2: #e74c3c;
  --gold: #d4a843; --gold2: #f0c060;
  --jade: #4a9e7f;
  --paper: #f5e6c8; --paper2: #ede0c0;
  --glow: 0 0 20px rgba(192,57,43,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--ink); color:var(--paper);
  font-family:'Noto Serif SC',serif; min-height:100vh; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(192,57,43,.12) 0%, transparent 70%);
}
.container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:0 20px 60px; }

/* Header */
header { text-align:center; padding:40px 20px 30px; }
header::after { content:''; display:block; width:200px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:20px auto 0; }
.header-tag { font-size:11px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; opacity:.7; margin-bottom:12px; }
h1 { font-family:'ZCOOL XiaoWei',serif; font-size:clamp(2.4rem,6vw,4rem); font-weight:400; color:var(--paper); letter-spacing:.08em; line-height:1; text-shadow:0 0 40px rgba(212,168,67,.2); }
h1 span { color:var(--cinnabar); }
.subtitle { font-size:13px; letter-spacing:3px; color:var(--paper2); opacity:.5; margin-top:10px; }

/* Location panel */
.location-panel { background:var(--ink2); border:1px solid rgba(212,168,67,.2); border-radius:2px; padding:28px 32px; margin-bottom:28px; position:relative; overflow:hidden; }
.location-panel::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(--cinnabar),transparent); }
.panel-title { font-size:11px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.panel-title::after { content:''; flex:1; height:1px; background:rgba(212,168,67,.15); }
.location-grid { display:grid; grid-template-columns:1fr 1fr auto; gap:16px; align-items:end; }
.input-group { display:flex; flex-direction:column; gap:6px; }
.input-group label { font-size:11px; letter-spacing:2px; color:var(--gold); opacity:.6; }
.input-group input { background:var(--ink3); border:1px solid rgba(212,168,67,.2); color:var(--paper); padding:10px 14px; font-family:'Noto Serif SC',serif; font-size:14px; outline:none; transition:border-color .2s; border-radius:1px; width:100%; }
.input-group input:focus { border-color:var(--gold); }
.input-group input::placeholder { color:rgba(245,230,200,.25); }
.btn-group { display:flex; gap:10px; flex-wrap:wrap; }
.btn { padding:10px 20px; font-family:'Noto Serif SC',serif; font-size:13px; cursor:pointer; border:none; letter-spacing:1px; transition:all .2s; white-space:nowrap; border-radius:1px; }
.btn-primary { background:var(--cinnabar); color:white; }
.btn-primary:hover { background:var(--cinnabar2); box-shadow:var(--glow); }
.btn-secondary { background:transparent; color:var(--gold); border:1px solid rgba(212,168,67,.4); }
.btn-secondary:hover { background:rgba(212,168,67,.08); border-color:var(--gold); }
.status-bar { margin-top:16px; font-size:12px; color:var(--gold); opacity:.7; min-height:18px; display:flex; align-items:center; gap:8px; }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--jade); }
.status-dot.loading { background:var(--gold); animation:pulse 1.2s infinite; }
.status-dot.error { background:var(--cinnabar); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Main grid */
.main-grid { display:grid; grid-template-columns:1fr 360px; gap:24px; margin-bottom:24px; }
@media(max-width:900px){ .main-grid{grid-template-columns:1fr} .location-grid{grid-template-columns:1fr 1fr} .btn-group{grid-column:1/-1} }
@media(max-width:640px){ .location-grid{grid-template-columns:1fr} #map{height:300px} }

/* Map */
.map-header { background:var(--ink2); border:1px solid rgba(212,168,67,.2); border-bottom:none; padding:12px 18px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
#map { width:100%; height:480px; border:1px solid rgba(212,168,67,.2); }
.map-loading { position:absolute; inset:0; background:rgba(10,10,15,.85); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:500; }
.spinner { width:44px; height:44px; border:2px solid rgba(212,168,67,.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.map-footer { background:var(--ink2); border:1px solid rgba(212,168,67,.2); border-top:none; padding:8px 18px; display:flex; gap:20px; font-size:11px; color:rgba(245,230,200,.4); flex-wrap:wrap; }
.coord-display span { color:var(--gold); opacity:.8; }
.layer-btn, .radius-btn { padding:4px 10px; font-size:11px; font-family:'Noto Serif SC',serif; cursor:pointer; border:1px solid rgba(212,168,67,.25); background:transparent; color:var(--paper2); letter-spacing:1px; transition:all .2s; border-radius:1px; }
.layer-btn.active,.layer-btn:hover,.radius-btn.active,.radius-btn:hover { background:rgba(212,168,67,.12); color:var(--gold); border-color:var(--gold); }
.map-btns { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

/* Compass */
.compass-panel { background:var(--ink2); border:1px solid rgba(212,168,67,.2); display:flex; flex-direction:column; }
.compass-header { padding:12px 18px; border-bottom:1px solid rgba(212,168,67,.1); }
.compass-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; gap:16px; }
.compass-deg { font-family:'ZCOOL XiaoWei',serif; font-size:2.8rem; color:var(--gold2); line-height:1; text-align:center; }
.compass-dir { font-size:13px; color:var(--cinnabar); letter-spacing:3px; margin-top:4px; text-align:center; }
.compass-coords { font-size:11px; color:rgba(245,230,200,.35); margin-top:6px; letter-spacing:1px; text-align:center; }

/* Analysis */
.section-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.section-header h2 { font-family:'ZCOOL XiaoWei',serif; font-size:1.5rem; font-weight:400; color:var(--paper); letter-spacing:.1em; }
.section-header::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(212,168,67,.3),transparent); }
.analysis-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-bottom:24px; }
.analysis-card { background:var(--ink2); border:1px solid rgba(212,168,67,.15); border-radius:2px; overflow:hidden; }
.card-header { padding:14px 18px 12px; border-bottom:1px solid rgba(212,168,67,.1); display:flex; align-items:center; gap:12px; }
.card-icon { width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:18px; background:rgba(192,57,43,.15); border:1px solid rgba(192,57,43,.3); border-radius:2px; flex-shrink:0; font-family:'ZCOOL XiaoWei',serif; }
.card-title { font-size:13px; letter-spacing:2px; color:var(--gold); }
.card-subtitle { font-size:10px; color:rgba(245,230,200,.3); letter-spacing:1px; margin-top:2px; }
.card-body { padding:16px 18px; }
.score-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.score-label { font-size:12px; color:rgba(245,230,200,.6); letter-spacing:1px; }
.score-value { font-size:13px; color:var(--gold2); font-weight:600; }
.score-bar-wrap { height:4px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; margin-bottom:14px; }
.score-bar { height:100%; border-radius:2px; transition:width 1s ease; }
.bar-excellent { background:linear-gradient(90deg,var(--jade),#6dcba0); }
.bar-good { background:linear-gradient(90deg,var(--gold),var(--gold2)); }
.bar-fair { background:linear-gradient(90deg,#c97b2f,#e09040); }
.bar-poor { background:linear-gradient(90deg,var(--cinnabar),var(--cinnabar2)); }
.analysis-text { font-size:13px; line-height:1.9; color:rgba(245,230,200,.7); }
.overall-card { background:linear-gradient(135deg,rgba(192,57,43,.1),rgba(212,168,67,.05)); border:1px solid rgba(212,168,67,.3); border-radius:2px; padding:28px 32px; margin-bottom:24px; display:flex; align-items:center; gap:32px; flex-wrap:wrap; }
.overall-number { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.overall-num { font-family:'ZCOOL XiaoWei',serif; font-size:2.2rem; color:var(--gold2); line-height:1; }
.overall-denom { font-size:11px; color:rgba(245,230,200,.3); letter-spacing:1px; }
.overall-info { flex:1; min-width:200px; }
.overall-grade { font-family:'ZCOOL XiaoWei',serif; font-size:1.8rem; letter-spacing:.2em; margin-bottom:8px; }
.overall-desc { font-size:14px; line-height:1.8; color:rgba(245,230,200,.65); }
.trigrams-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
.trigram-badge { padding:4px 10px; border:1px solid rgba(212,168,67,.25); font-size:11px; color:var(--gold); letter-spacing:1px; background:rgba(212,168,67,.05); }
.placeholder { text-align:center; padding:60px 20px; color:rgba(245,230,200,.2); font-size:14px; letter-spacing:2px; border:1px dashed rgba(212,168,67,.15); }
.fade-in { animation:fadeIn .6s ease forwards; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
hr.divider { border:none; border-top:1px solid rgba(212,168,67,.1); margin:24px 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-tag">Traditional Geomancy · 形家堪輿</div>
    <h1>風水<span>羅盤</span></h1>
    <div class="subtitle">FENG SHUI COMPASS · 地理形勢分析</div>
  </header>

  <div class="location-panel">
    <div class="panel-title">定位 · Location</div>
    <div class="location-grid">
      <div class="input-group">
        <label>緯度 · Latitude</label>
        <input type="number" id="latInput" placeholder="例: 31.2304" step="0.0001" min="-90" max="90">
      </div>
      <div class="input-group">
        <label>經度 · Longitude</label>
        <input type="number" id="lngInput" placeholder="例: 121.4737" step="0.0001" min="-180" max="180">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="analyzeFromInputs()">起盤 · Analyze</button>
        <button class="btn btn-secondary" onclick="getGPS()">📍 GPS</button>
        <button class="btn btn-secondary" onclick="getByIP()">🌐 IP定位</button>
      </div>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(212,168,67,.1);display:grid;grid-template-columns:auto 1fr auto 1fr;gap:10px 12px;align-items:center;flex-wrap:wrap">
      <label style="font-size:11px;letter-spacing:2px;color:var(--gold);opacity:.6;white-space:nowrap">API 端點</label>
      <input type="text" id="apiBaseInput" value="https://openrouter.ai/api/v1"
        placeholder="https://openrouter.ai/api/v1"
        style="background:var(--ink3);border:1px solid rgba(212,168,67,.2);color:var(--paper);padding:8px 14px;font-family:monospace;font-size:12px;outline:none;border-radius:1px;transition:border-color .2s;width:100%"
        onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='rgba(212,168,67,.2)'">
      <label style="font-size:11px;letter-spacing:2px;color:var(--gold);opacity:.6;white-space:nowrap">API Key</label>
      <input type="password" id="apiKeyInput"
        placeholder="sk-... （密鑰僅存於本頁面內存）"
        style="background:var(--ink3);border:1px solid rgba(212,168,67,.2);color:var(--paper);padding:8px 14px;font-family:monospace;font-size:12px;outline:none;border-radius:1px;transition:border-color .2s;width:100%"
        onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='rgba(212,168,67,.2)'">
      <label style="font-size:11px;letter-spacing:2px;color:var(--gold);opacity:.6;white-space:nowrap">模型</label>
      <input type="text" id="apiModelInput" value="google/gemini-2.0-flash-exp:free"
        placeholder="gpt-4o-mini / gemini-flash..."
        style="background:var(--ink3);border:1px solid rgba(212,168,67,.2);color:var(--paper);padding:8px 14px;font-family:monospace;font-size:12px;outline:none;border-radius:1px;transition:border-color .2s;width:100%"
        onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='rgba(212,168,67,.2)'">
      <div style="font-size:11px;color:rgba(245,230,200,.3);line-height:1.6">
        免費可用：
        <a href="https://openrouter.ai" target="_blank" style="color:var(--gold);opacity:.5;text-decoration:none">OpenRouter ↗</a>
        ·
        <a href="https://console.groq.com" target="_blank" style="color:var(--gold);opacity:.5;text-decoration:none">Groq ↗</a>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">等待定位 · Awaiting location</span>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="map-header">
        <div class="panel-title" style="margin:0;font-size:10px">地形圖 · Map</div>
        <div class="map-btns">
          <button class="layer-btn active" id="btn-street"    onclick="setLayer('street',this)">街道</button>
          <button class="layer-btn"        id="btn-satellite" onclick="setLayer('satellite',this)">衛星</button>
          <button class="layer-btn"        id="btn-terrain"   onclick="setLayer('terrain',this)">地形</button>
          <div style="width:1px;height:16px;background:rgba(212,168,67,.2);margin:0 4px"></div>
          <button class="radius-btn active" id="btn-r10"  onclick="setRadius(10,this)">10km</button>
          <button class="radius-btn"        id="btn-r100" onclick="setRadius(100,this)">100km</button>
        </div>
      </div>
      <div style="position:relative">
        <div id="map"></div>
        <div class="map-loading" id="mapLoading">
          <div class="spinner"></div>
          <div style="font-size:12px;letter-spacing:3px;color:var(--gold);opacity:.7">加載地圖中</div>
        </div>
      </div>
      <div class="map-footer">
        <div class="coord-display">緯度 <span id="dispLat">--</span></div>
        <div class="coord-display">經度 <span id="dispLng">--</span></div>
        <div class="coord-display" style="margin-left:auto">半徑 <span id="dispRadius">10 km</span></div>
      </div>
    </div>

    <div class="compass-panel">
      <div class="compass-header" style="display:flex;align-items:center;justify-content:space-between">
        <div class="panel-title" style="margin:0;font-size:10px">羅盤 · Compass</div>
        <button onclick="requestCompassPermission()" title="啟用陀螺儀讓羅盤隨設備旋轉"
          style="padding:3px 10px;font-size:10px;font-family:'Noto Serif SC',serif;cursor:pointer;border:1px solid rgba(212,168,67,.3);background:transparent;color:var(--gold);border-radius:1px;letter-spacing:1px">📱 感應器</button>
      </div>
      <div class="compass-body">
        <canvas id="compass" width="280" height="280"></canvas>
        <div>
          <div class="compass-deg" id="compassDeg">—°</div>
          <div class="compass-dir" id="compassDir">待定位</div>
          <div class="compass-coords" id="compassCoords">N/A</div>
        </div>
      </div>
    </div>
  </div>

  <div id="analysisSection">
    <div class="placeholder" id="analysisPlaceholder">
      <div style="font-size:3rem;margin-bottom:16px;opacity:.3">☯</div>
      <div>請先定位，方可起盤論命</div>
      <div style="margin-top:8px;font-size:11px;opacity:.6">Please locate first to begin geomantic analysis</div>
    </div>
    <div id="analysisContent" style="display:none"></div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
var mapObj = null;           // Leaflet map instance (avoid name clash with L.map)
var tileLayers = null;       // tile layer objects
var currentLayer = 'street';
var circle10 = null, circle100 = null, mapMarker = null;
var currentRadius = 10;
var currentLat = null, currentLng = null;

// ─── LEAFLET BOOTSTRAP ───────────────────────────────────────────────────────
// Inject CSS + JS dynamically, then call initMap() only after both are ready.
(function bootLeaflet() {
  // Inject CSS (fire-and-forget, no onload needed)
  var link = document.createElement('link');
  link.rel  = 'stylesheet';
  link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(link);

  // Inject JS — only callback we need
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = function() {
    initMap();
    document.getElementById('mapLoading').style.display = 'none';
    drawCompassBase();
    setTimeout(getGPS, 600);
  };
  script.onerror = function() {
    document.getElementById('mapLoading').style.display = 'none';
    setStatus('地圖庫加載失敗，請檢查網絡後刷新', 'error');
  };
  document.head.appendChild(script);
})();

function initMap() {
  mapObj = L.map('map', { zoomControl: true }).setView([31.23, 121.47], 10);

  tileLayers = {
    street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 19
    }),
    satellite: L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      subdomains: ['0','1','2','3'], attribution: '© Google', maxZoom: 20
    }),
    terrain: L.tileLayer('https://mt{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
      subdomains: ['0','1','2','3'], attribution: '© Google', maxZoom: 20
    })
  };
  tileLayers.street.addTo(mapObj);
  currentLayer = 'street';
}

// ─── MAP CONTROLS ─────────────────────────────────────────────────────────────
function setLayer(name, btn) {
  if (!mapObj || !tileLayers || currentLayer === name) return;
  mapObj.removeLayer(tileLayers[currentLayer]);
  tileLayers[name].addTo(mapObj);
  currentLayer = name;
  document.querySelectorAll('.layer-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function setRadius(km, btn) {
  currentRadius = km;
  document.getElementById('dispRadius').textContent = km + ' km';
  document.querySelectorAll('.radius-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (currentLat !== null && mapObj) drawCircles(currentLat, currentLng);
}

function drawCircles(lat, lng) {
  if (!mapObj) return;
  if (circle10)    { mapObj.removeLayer(circle10);    circle10 = null; }
  if (circle100)   { mapObj.removeLayer(circle100);   circle100 = null; }
  if (mapMarker)   { mapObj.removeLayer(mapMarker);   mapMarker = null; }

  circle10  = L.circle([lat,lng], { radius:10000,  color:'rgba(192,57,43,.8)',  fill:false, weight:1.5, dashArray:'5 5' }).addTo(mapObj);
  circle100 = L.circle([lat,lng], { radius:100000, color:'rgba(212,168,67,.4)', fill:false, weight:1,   dashArray:'7 7' }).addTo(mapObj);

  var icon = L.divIcon({
    html:'<div style="width:14px;height:14px;background:#c0392b;border-radius:50%;border:2px solid #d4a843;box-shadow:0 0 12px rgba(192,57,43,.9)"></div>',
    className:'', iconSize:[14,14], iconAnchor:[7,7]
  });
  mapMarker = L.marker([lat,lng], { icon: icon }).addTo(mapObj);
  mapObj.flyTo([lat,lng], currentRadius === 10 ? 11 : 8, { duration:1.2 });
}

// ─── LOCATION ─────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  document.getElementById('statusText').textContent = msg;
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
}

function getGPS() {
  if (!navigator.geolocation) { getByIP(); return; }
  setStatus('正在獲取GPS信號…', 'loading');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      document.getElementById('latInput').value = lat.toFixed(6);
      document.getElementById('lngInput').value = lng.toFixed(6);
      setStatus('GPS定位成功 · ' + lat.toFixed(4) + ', ' + lng.toFixed(4));
      runAnalysis(lat, lng, 'GPS');
    },
    function() {
      setStatus('GPS失敗，改用IP定位…', 'error');
      getByIP();
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function getByIP() {
  setStatus('通過IP定位中…', 'loading');
  fetch('https://ipapi.co/json/')
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.latitude) throw new Error();
      var lat = parseFloat(d.latitude), lng = parseFloat(d.longitude);
      document.getElementById('latInput').value = lat.toFixed(6);
      document.getElementById('lngInput').value = lng.toFixed(6);
      setStatus('IP定位 · ' + (d.city || '') + ' · 精度較低');
      runAnalysis(lat, lng, 'IP');
    })
    .catch(function(){ setStatus('IP定位失敗，請手動輸入坐標', 'error'); });
}

function analyzeFromInputs() {
  var lat = parseFloat(document.getElementById('latInput').value);
  var lng = parseFloat(document.getElementById('lngInput').value);
  if (isNaN(lat) || isNaN(lng))              { setStatus('請輸入有效的經緯度', 'error'); return; }
  if (lat < -90 || lat > 90)                 { setStatus('緯度範圍：-90 ~ 90', 'error'); return; }
  if (lng < -180 || lng > 180)               { setStatus('經度範圍：-180 ~ 180', 'error'); return; }
  setStatus('手動坐標 · ' + lat.toFixed(4) + ', ' + lng.toFixed(4));
  runAnalysis(lat, lng, '手動');
}

// ─── MAIN ANALYSIS RUNNER ─────────────────────────────────────────────────────
function runAnalysis(lat, lng, method) {
  currentLat = lat; currentLng = lng;
  drawCircles(lat, lng);
  updateCompass(lat, lng);
  document.getElementById('dispLat').textContent = lat.toFixed(6) + '°';
  document.getElementById('dispLng').textContent = lng.toFixed(6) + '°';
  callClaudeAPI(lat, lng, method);
}

async function callClaudeAPI(lat, lng, method) {
  document.getElementById('analysisPlaceholder').style.display = 'none';
  var c = document.getElementById('analysisContent');
  c.style.display = 'block';
  c.innerHTML = '<div style="text-align:center;padding:60px 20px">'
    + '<div class="spinner" style="margin:0 auto 20px"></div>'
    + '<div style="font-size:12px;letter-spacing:3px;color:var(--gold);opacity:.7">正在推算風水格局…</div>'
    + '<div style="font-size:11px;color:rgba(245,230,200,.3);margin-top:8px;letter-spacing:1px">Claude AI 分析中，請稍候</div>'
    + '</div>';

  var guaNames = ['坎','艮','震','巽','離','坤','兌','乾'];
  var zhouTian = guaNames[Math.floor(((lng+180)/360)*8) % 8];
  var diZhi    = guaNames[Math.floor(((lat+90)/180)*8) % 8];
  var year     = new Date().getFullYear();

  var prompt = '你是一位精通傳統堪輿學的風水師，擅長形家、理氣、玄空飛星、八卦方位等各派學說。\n\n'
    + '用戶所在位置：\n'
    + '- 緯度：' + lat.toFixed(6) + '°（' + (lat>=0?'北緯':'南緯') + '）\n'
    + '- 經度：' + lng.toFixed(6) + '°（' + (lng>=0?'東經':'西經') + '）\n'
    + '- 當前年份：' + year + '年，九運第' + (year-2024+1) + '年（2024-2043為九運，九紫離火當令）\n'
    + '- 方位推算：天干對應卦象參考「' + zhouTian + '」，地支對應「' + diZhi + '」\n\n'
    + '請根據傳統堪輿理論（坐山立向、玄空飛星、八卦方位、龍脈格局、水局分析）對此坐標進行系統性風水分析。\n\n'
    + '以JSON格式回覆，結構如下（所有字段必填，分數為1-100整數）：\n'
    + '{\n'
    + '  "overall": { "score": 整數, "grade": "上上之地|吉祥福地|平常之地|宜慎之地", "color": "#十六進制顏色", "summary": "50字內總評" },\n'
    + '  "zuoxiang": { "zuo": "坐山（如壬山）", "xiang": "朝向（如丙向）", "degrees": 整數, "explanation": "100字內說明" },\n'
    + '  "xuankong": { "period": 9, "star": 整數1-9, "wangShuai": "當旺|退氣|死氣|煞氣", "explanation": "100字內飛星分析" },\n'
    + '  "bagua": { "xiantian": "先天卦名", "houtian": "後天卦名", "wuxing": "金|木|水|火|土", "explanation": "80字內" },\n'
    + '  "longmai": { "score": 整數, "type": "格局類型", "explanation": "100字內" },\n'
    + '  "shuiju": { "score": 整數, "type": "格局類型", "explanation": "100字內" },\n'
    + '  "shafa": { "score": 整數, "explanation": "100字內砂手分析" },\n'
    + '  "recommendations": ["建議1（30字內）","建議2","建議3","建議4"],\n'
    + '  "cautions": ["忌諱1（30字內）","忌諱2","忌諱3"]\n'
    + '}\n\n只輸出JSON，不要任何其他文字。';

  var apiKey  = (document.getElementById('apiKeyInput').value  || '').trim();
  var apiBase = (document.getElementById('apiBaseInput').value || 'https://openrouter.ai/api/v1').trim().replace(/\/$/, '');
  var model   = (document.getElementById('apiModelInput').value || 'google/gemini-2.0-flash-exp:free').trim();

  if (!apiKey) {
    c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--cinnabar);font-size:13px;letter-spacing:1px">'
      + '⚠ 請填寫 API Key 後再起盤<br>'
      + '<span style="font-size:11px;color:var(--gold);opacity:.6;margin-top:10px;display:block">'
      + '推薦免費方案：<a href="https://openrouter.ai" target="_blank" style="color:var(--gold)">OpenRouter</a>'
      + '（註冊後有免費額度，選模型 google/gemini-2.0-flash-exp:free）</span></div>';
    return;
  }

  try {
    var resp = await fetch(apiBase + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 1500,
        messages: [
          { role: 'system', content: '你是一位精通傳統堪輿學的風水師。請嚴格按照用戶要求的JSON格式輸出，不要輸出任何其他文字。' },
          { role: 'user',   content: prompt }
        ]
      })
    });

    if (!resp.ok) {
      var errData = await resp.json().catch(function(){ return {}; });
      throw new Error((errData.error && errData.error.message) || ('HTTP ' + resp.status));
    }

    var data = await resp.json();
    var text = (data.choices[0].message.content || '').replace(/```json|```/g, '').trim();
    var result = JSON.parse(text);
    renderClaudeAnalysis(result, lat, lng, method);
    if (result.zuoxiang && result.zuoxiang.degrees != null) {
      setCompassFacing(result.zuoxiang.degrees, result.zuoxiang.xiang || result.zuoxiang.zuo);
    }
  } catch(err) {
    var msg = err.message || '請求出錯';
    c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--cinnabar);letter-spacing:1px;font-size:13px">'
      + '⚠ 分析失敗：' + msg + '<br>'
      + '<span style="font-size:12px;color:rgba(245,230,200,.5);margin-top:10px;display:block">'
      + '請確認 API Key 正確、端點可訪問，或嘗試更換模型</span></div>';
  }
}

// ─── COMPASS ─────────────────────────────────────────────────────────────────
// compassHeading: device heading in degrees (0=north, clockwise)
// facingDeg:      recommended facing from Claude API result (0=north, clockwise)
var compassHeading = 0;   // real device orientation, updated by sensor
var facingDeg = null;     // set after Claude returns result

// Request device orientation permission (iOS 13+)
function requestCompassPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(function(state) {
        if (state === 'granted') startCompassSensor();
      }).catch(console.error);
  } else {
    startCompassSensor();
  }
}

function startCompassSensor() {
  window.addEventListener('deviceorientationabsolute', onOrientation, true);
  window.addEventListener('deviceorientation',         onOrientation, true);
}

function onOrientation(e) {
  var heading;
  if (e.webkitCompassHeading !== undefined) {
    // iOS: webkitCompassHeading is clockwise from true north
    heading = e.webkitCompassHeading;
  } else if (e.absolute && e.alpha !== null) {
    // Android absolute: alpha is CCW from north, convert to CW
    heading = (360 - e.alpha) % 360;
  } else {
    return;
  }
  compassHeading = heading;
  renderCompass();
}

// Draw the full compass at current state
// The DIAL rotates with the device (so north on dial always faces real north)
// The RED NEEDLE is fixed pointing up (= toward real north from device POV)
// The GOLD ARC highlights the Claude-recommended facing direction
function renderCompass() {
  var canvas = document.getElementById('compass');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var cx = 140, cy = 140, r = 128;
  ctx.clearRect(0, 0, 280, 280);

  // Rotate entire dial by -compassHeading so north always faces up
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-compassHeading * Math.PI / 180);
  ctx.translate(-cx, -cy);

  // ── Rings
  [r, 108, 84, 60].forEach(function(rr, i) {
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2);
    ctx.strokeStyle = i===0 ? 'rgba(212,168,67,.45)' : 'rgba(212,168,67,.12)';
    ctx.lineWidth = i===0 ? 1.5 : 1; ctx.stroke();
  });

  // ── Tick marks
  for (var i = 0; i < 360; i += 5) {
    var rad = (i-90)*Math.PI/180;
    var len = (i%90===0) ? 18 : (i%10===0) ? 11 : 6;
    var r1 = r-2, r2 = r1-len;
    ctx.beginPath();
    ctx.moveTo(cx+r1*Math.cos(rad), cy+r1*Math.sin(rad));
    ctx.lineTo(cx+r2*Math.cos(rad), cy+r2*Math.sin(rad));
    ctx.strokeStyle = (i%90===0) ? 'rgba(192,57,43,.7)' : (i%10===0) ? 'rgba(212,168,67,.45)' : 'rgba(212,168,67,.15)';
    ctx.lineWidth = (i%90===0) ? 2 : 1; ctx.stroke();
  }

  // ── Direction labels (rotate with dial)
  var dLabels = ['北','NE','東','SE','南','SW','西','NW'];
  var dAngles = [0,45,90,135,180,225,270,315];
  ctx.textAlign='center'; ctx.textBaseline='middle';
  dAngles.forEach(function(angle, i) {
    var rad=(angle-90)*Math.PI/180, dr=93;
    ctx.font = (i%2===0) ? 'bold 15px "ZCOOL XiaoWei",serif' : '10px "Noto Serif SC",serif';
    ctx.fillStyle = (i===0) ? 'rgba(192,57,43,.95)' : (i%2===0) ? 'rgba(212,168,67,.85)' : 'rgba(245,230,200,.35)';
    ctx.fillText(dLabels[i], cx+dr*Math.cos(rad), cy+dr*Math.sin(rad));
  });

  // ── Five elements inner ring (rotate with dial)
  [['水',0,'#3a6ea8'],['木',90,'#4a9e5c'],['火',180,'#c0392b'],['金',270,'#d4a843']].forEach(function(el) {
    var rad=(el[1]-90)*Math.PI/180;
    ctx.font='13px "ZCOOL XiaoWei",serif'; ctx.fillStyle=el[2]; ctx.globalAlpha=.45;
    ctx.fillText(el[0], cx+52*Math.cos(rad), cy+52*Math.sin(rad));
  });
  ctx.globalAlpha=1;

  // ── Gold arc: highlight recommended facing (from Claude result)
  if (facingDeg !== null) {
    var arcRad = (facingDeg - 90) * Math.PI / 180;
    var arcSpan = 15 * Math.PI / 180; // ±15° arc
    ctx.beginPath();
    ctx.arc(cx, cy, r-4, arcRad - arcSpan, arcRad + arcSpan);
    ctx.strokeStyle = 'rgba(240,192,96,0.85)';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Arrow tip at arc center
    ctx.beginPath();
    ctx.moveTo(cx + (r-12)*Math.cos(arcRad), cy + (r-12)*Math.sin(arcRad));
    ctx.lineTo(cx + 68*Math.cos(arcRad), cy + 68*Math.sin(arcRad));
    ctx.strokeStyle = 'rgba(240,192,96,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3,4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore(); // end dial rotation

  // ── Fixed needle (always points up = toward real north, doesn't rotate with dial)
  // Red (north) half
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, cy - 72);
  ctx.strokeStyle = 'rgba(192,57,43,.95)';
  ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
  // White (south) half
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, cy + 58);
  ctx.strokeStyle = 'rgba(245,230,200,.3)';
  ctx.lineWidth = 2; ctx.stroke();
  // Center dot
  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='rgba(212,168,67,.9)'; ctx.fill();

  // Center label
  ctx.font='bold 15px "ZCOOL XiaoWei",serif';
  ctx.fillStyle='rgba(160,120,60,.65)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('土', cx, cy);
}

// Called when location is set — update coords display and draw compass
function updateCompass(lat, lng) {
  document.getElementById('compassCoords').textContent =
    Math.abs(lat).toFixed(4)+'°'+(lat>=0?'N':'S')+'  '+Math.abs(lng).toFixed(4)+'°'+(lng>=0?'E':'W');
  document.getElementById('compassDeg').textContent = '—°';
  document.getElementById('compassDir').textContent = '推算中…';
  facingDeg = null;
  renderCompass();
  // Start sensor (no-op if already running)
  requestCompassPermission();
}

// Called after Claude returns result — set the recommended facing on dial
function setCompassFacing(deg, zh) {
  facingDeg = deg;
  document.getElementById('compassDeg').textContent = deg + '°';
  document.getElementById('compassDir').textContent = zh;
  renderCompass();
}

// Initial draw with no rotation, no facing
function drawCompassBase() { renderCompass(); }

// ─── RENDER CLAUDE RESULT ─────────────────────────────────────────────────────
function renderClaudeAnalysis(a, lat, lng, method) {
  var og = a.overall;
  var scoreColor = og.score >= 85 ? '#4a9e7f' : og.score >= 70 ? '#d4a843' : og.score >= 55 ? '#c97b2f' : '#c0392b';

  function scoreBar(score) {
    var cls = score>=85?'bar-excellent':score>=70?'bar-good':score>=50?'bar-fair':'bar-poor';
    return '<div class="score-bar-wrap"><div class="score-bar '+cls+'" style="width:'+score+'%"></div></div>';
  }
  function gradeText(score) {
    return score>=85?'大吉':score>=70?'吉':score>=50?'平':'凶';
  }

  function card(icon, title, sub, score, body) {
    return '<div class="analysis-card">'
      +'<div class="card-header"><div class="card-icon">'+icon+'</div><div>'
      +'<div class="card-title">'+title+'</div>'
      +'<div class="card-subtitle">'+sub+'</div></div></div>'
      +'<div class="card-body">'
      +'<div class="score-row"><span class="score-label">評分</span>'
      +'<span class="score-value">'+score+' / 100 · '+gradeText(score)+'</span></div>'
      + scoreBar(score)
      +'<div class="analysis-text">'+body+'</div>'
      +'</div></div>';
  }

  // Recommendations & cautions
  var recHTML = (a.recommendations||[]).map(function(r){
    return '<div style="display:flex;gap:8px;margin-bottom:8px">'
      +'<span style="color:var(--jade);flex-shrink:0">✦</span>'
      +'<span style="font-size:13px;color:rgba(245,230,200,.75)">'+r+'</span></div>';
  }).join('');
  var cauHTML = (a.cautions||[]).map(function(r){
    return '<div style="display:flex;gap:8px;margin-bottom:8px">'
      +'<span style="color:var(--cinnabar);flex-shrink:0">✦</span>'
      +'<span style="font-size:13px;color:rgba(245,230,200,.75)">'+r+'</span></div>';
  }).join('');

  var circumference = 2 * Math.PI * 52;
  var html = '<div class="fade-in">'
    +'<div class="section-header"><h2>風水評斷 · AI推算</h2></div>'

    // Overall card
    +'<div class="overall-card">'
    +'<div style="position:relative;flex-shrink:0;width:120px;height:120px">'
    +'<svg width="120" height="120" viewBox="0 0 120 120">'
    +'<circle cx="60" cy="60" r="52" fill="none" stroke="rgba(212,168,67,.1)" stroke-width="8"/>'
    +'<circle cx="60" cy="60" r="52" fill="none" stroke="'+scoreColor+'" stroke-width="8"'
    +' stroke-dasharray="'+(circumference*og.score/100)+' '+(circumference*(1-og.score/100))+'"'
    +' stroke-dashoffset="'+(circumference*0.25)+'" stroke-linecap="round" opacity=".85"/>'
    +'</svg>'
    +'<div class="overall-number"><div class="overall-num">'+og.score+'</div><div class="overall-denom">/ 100</div></div>'
    +'</div>'
    +'<div class="overall-info">'
    +'<div class="overall-grade" style="color:'+scoreColor+'">'+og.grade+'</div>'
    +'<div class="overall-desc">'+og.summary+'</div>'
    +'<div class="trigrams-row">'
    +'<div class="trigram-badge">坐'+a.zuoxiang.zuo+'</div>'
    +'<div class="trigram-badge">向'+a.zuoxiang.xiang+'</div>'
    +'<div class="trigram-badge">九運'+a.xuankong.star+'星</div>'
    +'<div class="trigram-badge">'+a.xuankong.wangShuai+'</div>'
    +'<div class="trigram-badge">'+a.bagua.wuxing+'行</div>'
    +'<div class="trigram-badge">'+method+'定位</div>'
    +'</div></div></div>'

    // Analysis cards
    +'<div class="analysis-grid">'
    + card('向','坐山立向','24山向推算', Math.min(99,Math.max(10,a.zuoxiang.degrees)),
        '<strong style="color:var(--gold)">坐'+a.zuoxiang.zuo+'</strong> '
        +'<strong style="color:var(--cinnabar)">向'+a.zuoxiang.xiang+'</strong>（'+a.zuoxiang.degrees+'°）<br>'+a.zuoxiang.explanation)
    + card('星','玄空飛星','九運佈局分析', a.xuankong.star*11,
        '九運'+a.xuankong.star+'星到向，氣運<strong style="color:var(--gold)">'+a.xuankong.wangShuai+'</strong><br>'+a.xuankong.explanation)
    + card('卦','八卦方位','先後天卦象', 75,
        '先天卦：<strong style="color:var(--gold)">'+a.bagua.xiantian+'</strong>　'
        +'後天卦：<strong style="color:var(--gold)">'+a.bagua.houtian+'</strong>　'
        +'五行：<strong style="color:var(--cinnabar)">'+a.bagua.wuxing+'</strong><br>'+a.bagua.explanation)
    + card('龍','龍脈格局',a.longmai.type||'龍脈分析', a.longmai.score, a.longmai.explanation)
    + card('水','水局格局',a.shuiju.type||'水局分析',  a.shuiju.score, a.shuiju.explanation)
    + card('砂','砂手護衛','青龍白虎分析',             a.shafa.score,  a.shafa.explanation)
    +'</div>'

    // Recommendations
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">'
    +'<div class="analysis-card"><div class="card-header">'
    +'<div class="card-icon" style="font-size:14px">宜</div>'
    +'<div><div class="card-title">趨吉建議</div><div class="card-subtitle">Recommendations</div></div>'
    +'</div><div class="card-body">'+recHTML+'</div></div>'
    +'<div class="analysis-card"><div class="card-header">'
    +'<div class="card-icon" style="font-size:14px;background:rgba(192,57,43,.15)">忌</div>'
    +'<div><div class="card-title">化煞忌諱</div><div class="card-subtitle">Cautions</div></div>'
    +'</div><div class="card-body">'+cauHTML+'</div></div>'
    +'</div>'

    +'<hr class="divider">'
    +'<div style="font-size:11px;color:rgba(245,230,200,.18);text-align:center;letter-spacing:1px;padding-bottom:10px">'
    +'本分析由 Claude AI 依傳統堪輿理論推算，僅供參考。重大決策請諮詢專業堪輿師實地勘察。'
    +'</div></div>';

  document.getElementById('analysisContent').innerHTML = html;
}
